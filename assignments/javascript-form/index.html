<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Music Survey</title>

<style>
body {
font-family: Arial, sans-serif;
}

fieldset {
margin-bottom: 15px;
padding: 10px;
}

legend {
font-weight: bold;
}

textarea {
width: 400px;
height: 80px;
}
</style>
</head>

<body>

<h1>Music Survey</h1>

<form action="https://formspree.io/f/mnjgenqg" method="POST" onsubmit="return validateForm()">

<!-- Name -->
<label for="name">Name:</label><br>
<input type="text" id="name" name="name"><br><br>

<!-- Email -->
<label for="email">E-Mail:</label><br>
<input type="email" id="email" name="email"><br><br>

<!-- Favorite Music Types (Checkboxes) -->
<fieldset>
<legend>Select Your Favorite Types of Music:</legend>

<input type="checkbox" name="music" value="pop"> Pop<br>
<input type="checkbox" name="music" value="classical"> Classical<br>
<input type="checkbox" name="music" value="rock"> Rock<br>
<input type="checkbox" name="music" value="folk"> Folk<br>
<input type="checkbox" name="music" value="rap"> Rap<br>
<input type="checkbox" name="music" value="other"> Other<br>
</fieldset>

<!-- Purchase Frequency (Radio Buttons) -->
<fieldset>
<legend>Select how often you purchase Music:</legend>

<input type="radio" name="purchase" value="weekly"> Weekly<br>
<input type="radio" name="purchase" value="yearly"> A few CDs each year<br>
<input type="radio" name="purchase" value="monthly"> Monthly<br>
<input type="radio" name="purchase" value="never"> Never purchase<br>
</fieldset>

<!-- Locations (Select Box) -->
<label for="location">Select the locations you listen to Music:</label><br>
<select id="location" name="location" size="4">
<option value="At home">At home</option>
<option value="In the car">In the car</option>
<option value="Anywhere">Anywhere</option>
<option value="At work">At work</option>
</select>

<br><br>

<!-- Text Area -->
<label for="role">What role does music play in your life?</label><br>
<textarea id="role" name="role" cols="60" rows="3"></textarea>

<br><br>

<!-- Buttons -->
<input type="submit" value="Submit">
<input type="reset" value="Reset">

</form>

<br><br>
<p>Chris Harris</p>
<p>charris3326@gmail.com</p>

<script>
function validateForm() {
const name = document.getElementById('name').value.trim();
const email = document.getElementById('email').value.trim();
const musicCheckboxes = document.querySelectorAll('input[name="music"]:checked');
const purchaseRadios = document.querySelectorAll('input[name="purchase"]:checked');

if (name === '') {
alert('Please enter your name.');
return false;
}

const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
if (!emailRegex.test(email)) {
alert('Please enter a valid email address.');
return false;
}

if (musicCheckboxes.length === 0) {
alert('Please select at least one favorite type of music.');
return false;
}

if (purchaseRadios.length === 0) {
alert('Please select how often you purchase music.');
return false;
}

return true;
}
</script>

</body>
</html>
